# `cargo audit` configuration.
#
# These advisories are all "unmaintained" / soundness notices for transitive
# dependencies pulled in by the Tauri Linux stack (GTK3 / WebKitGTK / glib) and
# by Tauri's URL handling (unic-* via urlpattern). There are no upstream fixes
# available yet; they are tracked by the Tauri project and will clear as Tauri
# migrates off GTK3. None are exploitable vulnerabilities for this app, and the
# GTK3 ones only affect the Linux build. Re-review when bumping Tauri.
[advisories]
ignore = [
    # gtk-rs GTK3 bindings — no longer maintained (Linux only)
    "RUSTSEC-2024-0411", # gdkwayland-sys
    "RUSTSEC-2024-0412", # gdk
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0414", # gdkx11-sys
    "RUSTSEC-2024-0415", # gtk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0417", # gdkx11
    "RUSTSEC-2024-0418", # gdk-sys
    "RUSTSEC-2024-0419", # gtk3-macros
    "RUSTSEC-2024-0420", # gtk-sys
    # glib unsoundness in VariantStrIter (Linux only)
    "RUSTSEC-2024-0429", # glib
    # proc-macro-error — unmaintained (build-time only)
    "RUSTSEC-2024-0370", # proc-macro-error
    # unic-* — unmaintained, via Tauri/urlpattern
    "RUSTSEC-2025-0075", # unic-char-range
    "RUSTSEC-2025-0080", # unic-common
    "RUSTSEC-2025-0081", # unic-char-property
    "RUSTSEC-2025-0098", # unic-ucd-version
    "RUSTSEC-2025-0100", # unic-ucd-ident
]
