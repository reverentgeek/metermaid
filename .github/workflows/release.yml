name: Release

# Builds distributable installers for macOS, Windows, and Linux (x64 + arm64)
# and uploads them to a draft GitHub Release.
#
# Trigger by pushing a version tag:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Or run manually from the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Create the draft release once, up front, and hand its id to every build job.
  # Letting each tauri-action job create-or-find the release races when the
  # matrix jobs start together, producing duplicate drafts with assets split
  # across them. Creating it here and uploading by id keeps everything in one.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.release_id }}
    steps:
      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `MeterMaid ${tag}`,
              draft: true,
              prerelease: false,
            });
            core.setOutput('release_id', data.id);

  release:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Apple Silicon runner builds both arches natively.
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin

          # Linux — native runners per arch (avoids painful webkitgtk cross-compile).
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            args: ""

          # Windows — x64 native; arm64 cross-compiled on the x64 runner.
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - platform: windows-latest
            target: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    # Secrets can't be referenced directly in step `if:` conditions, so expose a
    # boolean flag here and gate the signing steps on it. Signing stays fully off
    # until the corresponding secrets are added (builds are produced unsigned).
    env:
      APPLE_SIGNING_ENABLED: ${{ secrets.APPLE_CERTIFICATE != '' }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libasound2-dev \
            xdg-utils

      # `xdg-utils` (provides /usr/bin/xdg-open) is required by the bundler since
      # the app embeds tauri-plugin-opener. The x86_64 ubuntu image ships it, but
      # the ubuntu-*-arm image does not — without it the ARM bundle step fails
      # with "xdg-open binary not found".

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Only export the Apple signing/notarization env when the certificate secret
      # is present. Passing these as empty strings makes the Tauri bundler attempt
      # `security import` on an empty cert and fail, so they must be absent (not
      # empty) for unsigned builds.
      #
      # To enable signed, notarized macOS builds, add these repository secrets
      # (Settings -> Secrets and variables -> Actions):
      #   APPLE_CERTIFICATE          - base64-encoded .p12 Developer ID Application cert
      #   APPLE_CERTIFICATE_PASSWORD - password for the .p12
      #   APPLE_SIGNING_IDENTITY     - e.g. "Developer ID Application: Your Name (TEAMID)"
      #   APPLE_ID                   - Apple ID email used for notarization
      #   APPLE_PASSWORD             - app-specific password for that Apple ID
      #   APPLE_TEAM_ID              - 10-character Apple Developer Team ID
      - name: Configure Apple signing & notarization
        if: ${{ runner.os == 'macOS' && env.APPLE_SIGNING_ENABLED == 'true' }}
        run: |
          {
            echo "APPLE_CERTIFICATE<<__EOF__"
            echo "${{ secrets.APPLE_CERTIFICATE }}"
            echo "__EOF__"
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple signing vars (when enabled) are injected via $GITHUB_ENV above.
          #
          # Windows signing is configured through tauri.conf.json's
          # bundle.windows.signCommand (e.g. Azure Trusted Signing or a local
          # .pfx). Add it there plus any required secrets when you enable it.
          #
          # Updater signing — required now that bundle.createUpdaterArtifacts is
          # enabled. Without these the build fails to sign the update bundle. The
          # public counterpart lives in tauri.conf.json (plugins.updater.pubkey).
          # The keypair was generated with an empty password, so the PASSWORD
          # secret may be unset/empty; add both under Settings -> Secrets:
          #   TAURI_SIGNING_PRIVATE_KEY          - contents of the generated key file
          #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD - password for that key (empty here)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Upload to the single draft release created by the create-release job
          # (passing releaseId stops tauri-action from creating its own, which is
          # what caused duplicate drafts). Review and publish it manually once all
          # matrix jobs have uploaded their assets.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
