name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Detect which part of the monorepo changed so we can skip the expensive app
  # matrix on website-only changes (and skip the site build on app-only changes).
  # The app/audit jobs below are gated on `app`; when a PR touches only site
  # files they're SKIPPED — and GitHub counts a skipped required check as
  # passing, so the required contexts (build-and-test (macos/ubuntu-latest),
  # audit) don't block a website-only PR. A workflow-level paths filter would
  # instead leave those checks pending forever, blocking the merge — hence this
  # job-level gate.
  #
  # Classification is an explicit git diff rather than a glob-filter action:
  # "app = any changed file that isn't a site file" can't be expressed as an
  # OR-of-globs (a leading '**' always wins over a later '!negation'), so we
  # walk the changed-file list directly. Site files = site/** plus the
  # site-owned root files (netlify.toml and the site-deploy workflow).
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.classify.outputs.app }}
      site: ${{ steps.classify.outputs.site }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: classify
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
          else
            base="$PUSH_BEFORE"
          fi
          # Fall back to the previous commit if the base is missing or unknown
          # (e.g. a brand-new branch's first push reports an all-zero before).
          if [ -z "$base" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          changed="$(git diff --name-only "$base" HEAD)"
          echo "Base: $base"
          echo "Changed files:"
          printf '%s\n' "$changed" | sed 's/^/  /'
          app=false
          site=false
          any=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            any=true
            case "$f" in
              # Website (site/ wins first, so site docs like site/CLAUDE.md and
              # the page-content site/content/*.md still build + test the site).
              site/*|netlify.toml|.github/workflows/site-deploy.yml) site=true ;;
              # Documentation needs neither the Rust matrix nor the site build,
              # so a root README/CHANGELOG/CLAUDE/LICENSE or docs/ edit (even when
              # bundled into a website PR) does not spin up build-and-test.
              *.md|docs/*|LICENSE*) ;;
              # Everything else is app code/config (src/, src-tauri/, lockfiles,
              # third-party/, the CI workflow itself, …).
              *) app=true ;;
            esac
          done <<< "$changed"
          # Safety net only for a genuinely empty diff (e.g. base detection
          # failed): run everything. A docs-only change legitimately runs neither.
          if [ "$any" = false ]; then
            app=true
            site=true
          fi
          echo "app=$app" >> "$GITHUB_OUTPUT"
          echo "site=$site" >> "$GITHUB_OUTPUT"
          echo "Classified: app=$app site=$site"

  build-and-test:
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest covers the x64 ASIO build path (cfg-gated to
        # x86_64-pc-windows-msvc) so it can't silently rot. ARM64 Windows has no
        # ASIO SDK and isn't a host runner, so it's left to the release build.
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libasound2-dev

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # The x64 Windows build links ASIO (cfg-gated), which compiles the vendored
      # SDK's C++ via the `cc` crate (needs the MSVC toolchain on PATH) and runs
      # bindgen (needs libclang). These steps are no-ops on Linux/macOS.
      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure ASIO build env (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CPAL_ASIO_DIR=${GITHUB_WORKSPACE}/third-party/asio" >> "$GITHUB_ENV"
          # LLVM is preinstalled on the GitHub windows runner image; bindgen
          # needs libclang. Adjust if the image layout changes.
          echo 'LIBCLANG_PATH=C:\Program Files\LLVM\bin' >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Rustfmt
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: src-tauri

      - name: Test
        run: cargo test
        working-directory: src-tauri

  audit:
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # Reads the curated ignore list in src-tauri/.cargo/audit.toml.
      - name: Cargo audit
        run: cargo audit
        working-directory: src-tauri

  # Website build + Playwright suite. Runs only when site/ changed, in the
  # Node version the site actually deploys on (Netlify NODE_VERSION in
  # netlify.toml).
  build-site:
    needs: changes
    if: ${{ needs.changes.outputs.site == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Build and test
        run: pnpm test

  # Single required status check for branch protection. The per-job checks
  # above can't be required directly: a skipped MATRIX job (build-and-test on a
  # site-only change) never reports its per-OS contexts — GitHub collapses it to
  # one "build-and-test" check — so requiring "build-and-test (macos-latest)"
  # would leave that context pending forever and block site-only PRs. This gate
  # always runs and passes as long as every upstream job either succeeded or was
  # intentionally skipped, so the ruleset requires just "CI OK".
  ci-ok:
    name: CI OK
    needs: [changes, build-and-test, audit, build-site]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        env:
          RESULTS: >-
            ${{ needs.changes.result }}
            ${{ needs.build-and-test.result }}
            ${{ needs.audit.result }}
            ${{ needs.build-site.result }}
        run: |
          echo "Upstream job results: $RESULTS"
          for r in $RESULTS; do
            case "$r" in
              success|skipped) ;;
              *) echo "::error::A CI job did not pass (result: $r)"; exit 1 ;;
            esac
          done
          echo "All CI jobs succeeded or were intentionally skipped."
