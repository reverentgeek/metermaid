name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        # windows-latest covers the x64 ASIO build path (cfg-gated to
        # x86_64-pc-windows-msvc) so it can't silently rot. ARM64 Windows has no
        # ASIO SDK and isn't a host runner, so it's left to the release build.
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libasound2-dev

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # The x64 Windows build links ASIO (cfg-gated), which compiles the vendored
      # SDK's C++ via the `cc` crate (needs the MSVC toolchain on PATH) and runs
      # bindgen (needs libclang). These steps are no-ops on Linux/macOS.
      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure ASIO build env (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CPAL_ASIO_DIR=${GITHUB_WORKSPACE}/third-party/asio" >> "$GITHUB_ENV"
          # LLVM is preinstalled on the GitHub windows runner image; bindgen
          # needs libclang. Adjust if the image layout changes.
          echo 'LIBCLANG_PATH=C:\Program Files\LLVM\bin' >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Rustfmt
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: src-tauri

      - name: Test
        run: cargo test
        working-directory: src-tauri

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # Reads the curated ignore list in src-tauri/.cargo/audit.toml.
      - name: Cargo audit
        run: cargo audit
        working-directory: src-tauri
